name: WatchGPT
options:
  bundleIdPrefix: dev.watchgpt
  deploymentTarget:
    watchOS: "11.0"
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  WatchGPT:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    configFiles:
      Debug: WatchGPT/Config/WatchGPT.xcconfig
      Release: WatchGPT/Config/WatchGPT.xcconfig
    sources:
      - path: WatchGPT
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: WatchGPT
        PRODUCT_BUNDLE_IDENTIFIER: dev.watchgpt.app.watchkitapp
        INFOPLIST_FILE: WatchGPT/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchGPT/WatchGPT.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ENABLE_PREVIEWS: YES
        SKIP_INSTALL: YES
  WatchGPTPhone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: WatchGPTPhone/Config/WatchGPTPhone.xcconfig
      Release: WatchGPTPhone/Config/WatchGPTPhone.xcconfig
    sources:
      - path: WatchGPTPhone
      - path: Shared
      - path: WatchGPT/Assets.xcassets
    dependencies:
      - target: WatchGPT
        embed: true
    settings:
      base:
        PRODUCT_NAME: WatchGPTPhone
        PRODUCT_BUNDLE_IDENTIFIER: dev.watchgpt.app
        INFOPLIST_FILE: WatchGPTPhone/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: PhoneAppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  WatchGPTPhone:
    build:
      targets:
        WatchGPTPhone: all
        WatchGPT: all
    run:
      config: Debug
      executable: WatchGPTPhone
